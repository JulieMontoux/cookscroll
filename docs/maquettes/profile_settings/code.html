<script>
    // Subtle interactivity: Streak icon pulse
    const streakContainer = document.querySelector('.bg-primary-container\\/20');
    if (streakContainer) {
      streakContainer.addEventListener('mouseenter', () => {
        const icon = streakContainer.querySelector('.material-symbols-outlined');
        icon.classList.add('animate-bounce');
        setTimeout(() => icon.classList.remove('animate-bounce'), 1000);
      });
    }

    // Tab interaction feedback
    const navItems = document.querySelectorAll('nav a');
    navItems.forEach(item => {
      item.addEventListener('click', (e) => {
        // Prevent actual navigation for demo
        if (item.querySelector('span:last-child').textContent !== 'Profile') {
          e.preventDefault();
        }
      });
    });
  </script>
