<script>
        function selectSkill(element) {
            // Remove selection from all cards
            const cards = document.querySelectorAll('#skill-picker button');
            cards.forEach(card => {
                card.classList.remove('skill-card-selected');
                const icon = card.querySelector('.material-symbols-outlined[data-icon=""]'); // Target check icon
                // Manually handle the opacity since it's cleaner than complex group selectors in JS
                const checkIcon = card.querySelector('span.material-symbols-outlined:last-of-type');
                if(checkIcon) checkIcon.classList.add('opacity-0');
            });

            // Add selection to clicked card
            element.classList.add('skill-card-selected');
            const currentCheck = element.querySelector('span.material-symbols-outlined:last-of-type');
            if(currentCheck) currentCheck.classList.remove('opacity-0');
            
            // Haptic feedback simulation
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }
    </script>
