<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 z-50 flex justify-between items-center w-full px-container-margin py-sm bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md">
<button class="p-2 rounded-full hover:bg-surface-variant/20 active:scale-95 transition-transform duration-200 text-primary dark:text-inverse-primary" onclick="history.back()">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<span class="font-display-lg-mobile text-display-lg-mobile font-bold text-primary dark:text-inverse-primary">CookScroll</span>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="flex-grow flex flex-col items-center justify-center pt-xl px-container-margin pb-xl">
<!-- Hero Decorative Section -->
<div class="w-full max-w-md mb-lg text-center">
<h1 class="font-display-lg text-display-lg text-on-surface mb-sm" id="form-title">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant" id="form-subtitle">Your personal kitchen companion awaits.</p>
</div>
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0px_8px_24px_rgba(0,0,0,0.06)] p-lg space-y-lg border border-outline-variant/30">
<!-- Standard Form -->
<form class="space-y-md" id="auth-form">
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-sm" for="email">Email Address</label>
<input class="w-full px-md py-md rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container text-on-surface font-body-md placeholder:text-outline-variant" id="email" placeholder="chef@cookscroll.com" type="email"/>
</div>
<div class="space-y-xs">
<div class="flex justify-between items-center px-sm">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot?</a>
</div>
<input class="w-full px-md py-md rounded-xl bg-surface-container-low border-none focus:ring-2 focus:ring-primary-container text-on-surface font-body-md placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full py-md rounded-full bg-primary text-on-primary font-headline-sm text-headline-sm shadow-lg active:scale-95 transition-all duration-200" id="submit-btn" type="submit">
                    Sign In
                </button>
</form>
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-md font-label-md text-label-md text-outline">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm py-sm rounded-xl border border-outline-variant hover:bg-surface-variant/10 active:scale-95 transition-all duration-150">

<span class="font-label-lg text-label-lg text-on-surface">Apple</span>
</button>
<button class="flex items-center justify-center gap-sm py-sm rounded-xl border border-outline-variant hover:bg-surface-variant/10 active:scale-95 transition-all duration-150">
<img alt="Google Logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBRIxZ43Wkjb7d95TLHSZkUr4rezrFw9WTMtXg7LDt_gEOXkvkWKEL8O7OIScQElJA8r4g7Olbs--qZYhBHbJLxPJDjbvjz11oSBpf4JuShdq25iI7WeEjsRARDFkomNHyHtik7P2SKpMiq5b0Klmvk_-CbTkjj0qBuQz4LJtvwj9KaY57RLI3BC8fyfO6DkTm0v5LrAgkhLt0i6_iQvVfQ8eo-ilBMwr4DZwCiV5INNES-QGkwajGcf3HzNziz4dAR6cHqxqH3dUUN"/>
<span class="font-label-lg text-label-lg text-on-surface">Google</span>
</button>

<!-- Switcher -->
<div class="pt-sm text-center">

                    Don't have an account? 
                    <button class="text-primary font-label-lg text-label-lg ml-xs hover:underline cursor-pointer" id="toggle-btn" onclick="toggleState()">Sign Up</button>
</p>

<!-- Decorative Background Image (Asymmetric Placement) -->

<img class="w-full h-full object-cover rounded-tl-[120px]" data-alt="A macro photograph of fresh vibrant herbs and spices scattered artistically on a clean white marble countertop. The lighting is soft and natural, emphasizing the bright greens and earthy tones to match an energetic and fresh kitchen companion aesthetic. The composition is clean with significant whitespace, reflecting a modern minimalist design approach focused on quality culinary experiences." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgdjfEa6NOnAhwoMhID5jvX2VFdQZzIhTTs9AdXzjq8kH1lSDFBYqSWiR2cTtpRXU9SggK7C3iceaQpeots7_9vcRkBYqAvzMDvzd-NzBWdxVvB2WsOmawZQmteGRK_4UTtj5azC8USt3XRojWAKAPo4uOauXYsRZ_e_DsvPjzthCCoVFBzzvEUabxHUx6YTWYRMRXjGDHhnuv3VotnmLNTMihkpJXTUesLhprxTgVfhG6WjKJVPFeExjVpfsU46idKP-2w4LHwdPJ"/>
</div>
<script>
        let isLogin = true;

        function toggleState() {
            isLogin = !isLogin;
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const submitBtn = document.getElementById('submit-btn');
            const toggleBtn = document.getElementById('toggle-btn');
            const toggleContainer = document.getElementById('toggle-container');

            if (isLogin) {
                title.innerText = 'Welcome Back';
                subtitle.innerText = 'Your personal kitchen companion awaits.';
                submitBtn.innerText = 'Sign In';
                toggleBtn.innerText = 'Sign Up';
                toggleContainer.innerHTML = `Don't have an account? <button id="toggle-btn" class="text-primary font-label-lg text-label-lg ml-xs hover:underline cursor-pointer" onclick="toggleState()">Sign Up</button>`;
            } else {
                title.innerText = 'Join the Kitchen';
                subtitle.innerText = 'Create an account to save your favorite recipes.';
                submitBtn.innerText = 'Create Account';
                toggleBtn.innerText = 'Log In';
                toggleContainer.innerHTML = `Already have an account? <button id="toggle-btn" class="text-primary font-label-lg text-label-lg ml-xs hover:underline cursor-pointer" onclick="toggleState()">Log In</button>`;
            }
        }

        // Handle form submission animation
        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerText;
            btn.innerHTML = `<span class="inline-block animate-spin material-symbols-outlined" style="font-size: 20px;">progress_activity</span>`;
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                alert('Interaction demonstration complete.');
            }, 1500);
        });
    </script>
