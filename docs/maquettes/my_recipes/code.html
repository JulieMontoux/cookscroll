<script>
        // Micro-interactions for tab switching
        const tabs = document.querySelectorAll('nav div button');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('text-primary');
                    t.classList.add('text-on-surface-variant');
                    const indicator = t.querySelector('div');
                    if(indicator) indicator.remove();
                });
                tab.classList.remove('text-on-surface-variant');
                tab.classList.add('text-primary');
                const newIndicator = document.createElement('div');
                newIndicator.className = 'absolute inset-x-0 bottom-0 h-1 bg-primary rounded-t-full';
                tab.appendChild(newIndicator);
            });
        });

        // Simple toggle for favorite buttons
        document.querySelectorAll('article button').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const icon = btn.querySelector('span');
                const isFilled = icon.style.fontVariationSettings.includes("'FILL' 1");
                icon.style.fontVariationSettings = isFilled ? "'FILL' 0" : "'FILL' 1";
                btn.classList.add('scale-125');
                setTimeout(() => btn.classList.remove('scale-125'), 150);
            });
        });
    </script>
