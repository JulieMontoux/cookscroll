<script>
        // Simple touch interaction for heart button
        document.querySelectorAll('[data-icon="favorite"]').forEach(btn => {
            btn.closest('button').addEventListener('click', function() {
                const span = this.querySelector('.material-symbols-outlined');
                const isFilled = span.style.fontVariationSettings.includes("'FILL' 1");
                span.style.fontVariationSettings = isFilled ? "'FILL' 0" : "'FILL' 1";
                if(!isFilled) {
                    this.classList.add('text-primary-container');
                    // Sparkle effect placeholder
                } else {
                    this.classList.remove('text-primary-container');
                }
            });
        });
    </script>
