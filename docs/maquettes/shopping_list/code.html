<!-- Micro-interaction for striking through items -->
<script>
        // Checkboxes already have inline onchange, but we could add more logic here
        document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('click', () => {
                // Future enhancement: update total progress or send to server
                if (checkbox.checked) {
                    const ripple = document.createElement('div');
                    ripple.className = 'absolute w-4 h-4 bg-primary/20 rounded-full animate-ping pointer-events-none';
                    checkbox.parentElement.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 500);
                }
            });
        });
    </script>
