name: cookscroll
description: "Discover recipes. Plan your week. Shop smarter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0

  # Local database (offline)
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.29
  path_provider: ^2.1.5
  path: ^1.9.0

  # Auth
  flutter_secure_storage: ^9.2.4

  # Images
  cached_network_image: ^3.4.1

  # Typography
  google_fonts: ^6.2.1

  # Data classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  cupertino_icons: ^1.0.8

  # Seed script
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.4
  drift_dev: ^2.23.1

  # Testing
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
